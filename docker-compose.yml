services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: senmarket-backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - uploads_data:/app/backend/uploads
    networks:
      - senmarket
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL}
    container_name: senmarket-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - senmarket

volumes:
  uploads_data:

networks:
  senmarket:
    driver: bridge
